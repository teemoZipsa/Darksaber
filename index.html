<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Saver Style Prototype</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="ui-layer">
            <h2>Grid RPG Prototype</h2>
            <p>Use Arrow Keys to Move<br>Space to Wait/End Turn</p>
            <div id="info-panel">
                <span id="player-pos">Pos: (0, 0)</span> | 
                <span id="turn-info">Turn: Player</span>
            </div>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
